<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
    <script src="https://unpkg.com/@shopify/app-bridge-utils@3"></script>
  </head>
  <body>
    <script>
      console.log('🔥 INDEX.HTML LOADED');

    const params = new URLSearchParams(window.location.search);
    const SHOP_DOMAIN = params.get('shop');
    const HOST = params.get('host');

        console.log('🧪 shop param:', SHOP_DOMAIN);
        console.log('🧪 host param:', HOST);

        if (!SHOP_DOMAIN || !HOST) {
        throw new Error('Missing shop or host');
        }

      const AppBridge = window['app-bridge'];

      console.log('🔎 Raw AppBridge:', AppBridge);

      if (!AppBridge) {
        throw new Error('App Bridge missing');
      }

      // ✅ NORMALISE (this is the key)
      const createApp =
        AppBridge.createApp ||
        AppBridge.default ||
        AppBridge;

      const Redirect = AppBridge.actions.Redirect;

      if (typeof createApp !== 'function') {
        throw new Error('createApp is not a function');
      }

      console.log('✅ App Bridge resolved');

      const app = createApp({
        apiKey: '408976a7af61fa183b5f19a4c6f11a86',
        host: HOST,
        forceRedirect: true,
      });

      const redirect = Redirect.create(app);
      const AppBridgeUtils =
        window['app-bridge-utils'] ||
        window.appBridgeUtils ||
        window.appBridgeUtilities;
      const authenticatedFetch = AppBridgeUtils?.authenticatedFetch
        ? AppBridgeUtils.authenticatedFetch(app)
        : null;

      async function fetchWithToken(url, options = {}) {
        if (!authenticatedFetch) {
          throw new Error('authenticatedFetch missing');
        }
        const res = await authenticatedFetch(url, options);
        if (!res.ok) {
          const text = await res.clone().text();
          console.error('[fetchWithToken] error', url, res.status, text);
        }
        return res;
      }

      console.log('➡️ Checking install status');

      fetchWithToken(`/auth/status?shop=${SHOP_DOMAIN}`)
        .then(res => res.json())
        .then(({ installed }) => {
          if (!installed) {
            console.log('🔁 App not installed, starting OAuth');
            const installUrl = `${window.location.origin}/auth/install?shop=${SHOP_DOMAIN}`;
            if (window.top && window.top !== window.self) {
              window.top.location.href = installUrl;
            } else {
              redirect.dispatch(Redirect.Action.REMOTE, installUrl);
            }
          } else {
            console.log('✅ App already installed, rendering UI');
          }
        });

    </script>

            <h2>Recip Settings</h2>

        <label>
        <input type="checkbox" id="activeToggle" />
        Recip Active
        </label>
        <div style="margin-top: 12px;">
          <label for="discountType">Discount type</label>
          <select id="discountType">
            <option value="PERCENTAGE">Percentage (%)</option>
            <option value="FIXED">Fixed amount</option>
          </select>
        </div>
        <div style="margin-top: 8px;">
          <label for="discountValue">Discount value</label>
          <input id="discountValue" type="number" min="0.01" step="0.01" />
        </div>
        <button id="saveDiscountSettings" style="margin-top: 8px;">Save discount settings</button>
        <div id="settingsError" style="color: red; margin-top: 6px;"></div>

    <script>
    const activeToggle = document.getElementById('activeToggle');
    const discountType = document.getElementById('discountType');
    const discountValue = document.getElementById('discountValue');
    const saveDiscountSettings = document.getElementById('saveDiscountSettings');
    const settingsError = document.getElementById('settingsError');

    function setSettingsError(msg) {
      settingsError.textContent = msg || '';
    }

    function validateDiscountInputs() {
      const type = discountType.value;
      const value = Number(discountValue.value);

      if (!Number.isFinite(value) || value <= 0) {
        return 'Please enter a valid discount value greater than 0';
      }
      if (type === 'PERCENTAGE' && value > 100) {
        return 'Percentage discount cannot exceed 100';
      }
      return null;
    }

    async function updateSettings(payload) {
      const res = await fetchWithToken('/api/settings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Shopify-Shop-Domain': new URLSearchParams(location.search).get('shop')
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || 'Failed to save settings');
      }
      return data;
    }

    async function loadSettings() {
    try {
      const res = await fetchWithToken('/api/settings', {
          headers: {
          'X-Shopify-Shop-Domain': new URLSearchParams(location.search).get('shop')
          }
      });

      const settings = await res.json();
      activeToggle.checked = settings.active;
      discountType.value = settings.discountType || 'PERCENTAGE';
      discountValue.value = Number(settings.discountValue || 10).toString();
    } catch (err) {
      console.error('[settings] load error', err);
      setSettingsError('Failed to load settings');
    }
    }

    activeToggle.addEventListener('change', async e => {
      try {
        setSettingsError(null);
        await updateSettings({ active: e.target.checked });
      } catch (err) {
        console.error('[settings] active save error', err);
        setSettingsError(err.message || 'Failed to save settings');
      }
    });

    saveDiscountSettings.addEventListener('click', async () => {
      try {
        setSettingsError(null);
        const validationError = validateDiscountInputs();
        if (validationError) {
          setSettingsError(validationError);
          return;
        }

        await updateSettings({
          discountType: discountType.value,
          discountValue: Number(discountValue.value),
        });
      } catch (err) {
        console.error('[settings] discount save error', err);
        setSettingsError(err.message || 'Failed to save discount settings');
      }
    });

    loadSettings();
    </script>

    <h3>Friendly Brands</h3>

<input id="brandInput" placeholder="examplebrand.co.uk" />
<button id="addBrand">Add</button>
<div id="brandError" style="color: red; margin-top: 6px;"></div>

<ul id="brandList"></ul>

<script>
const shop = new URLSearchParams(location.search).get('shop');

const input = document.getElementById('brandInput');
const addBtn = document.getElementById('addBrand');
const errorEl = document.getElementById('brandError');
const list = document.getElementById('brandList');

let existingBrands = [];

function normaliseDomain(value) {
  return value
    .toLowerCase()
    .trim()
    .replace(/^https?:\/\//, '')
    .replace(/\/$/, '');
}

function setError(msg) {
  errorEl.textContent = msg || '';
}

async function loadBrands() {
  const res = await fetchWithToken('/api/friendly-brands', {
    headers: { 'X-Shopify-Shop-Domain': shop }
  });

  existingBrands = await res.json();
  list.innerHTML = '';

  existingBrands.forEach(b => {
    const li = document.createElement('li');
    li.textContent = b.brandDomain + ' ';

    const btn = document.createElement('button');
    btn.textContent = 'Remove';
    btn.onclick = async () => {
      await fetchWithToken(`/api/friendly-brands/${b.id}`, { method: 'DELETE' });
      loadBrands();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });
}

    addBtn.onclick = async () => {
      setError(null);

  const raw = input.value;
  const domain = normaliseDomain(raw);

  if (!domain) {
    return setError('Please enter a brand domain');
  }

  if (domain === shop) {
    return setError('You cannot add your own store');
  }

  if (existingBrands.length >= 3) {
    return setError('You can only add up to 3 friendly brands');
  }

  if (existingBrands.some(b => b.brandDomain === domain)) {
    return setError('That brand has already been added');
  }

  addBtn.disabled = true;
  addBtn.textContent = 'Adding…';

  try {
    console.log('[friendly-brands] POST start');
    const res = await fetchWithToken('/api/friendly-brands', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Shopify-Shop-Domain': shop
      },
      body: JSON.stringify({ brandDomain: domain })
    });

    const text = await res.text();
    let data = {};
    if (text) {
      try {
        data = JSON.parse(text);
      } catch {
        console.error('[friendly-brands] non-json response', text);
      }
    }

    if (!res.ok) {
      setError(data.error || 'Failed to add brand');
    } else {
      input.value = '';
      await loadBrands();
    }
  } catch (err) {
    console.error('[friendly-brands] POST error', err);
    setError(err.message || 'Failed to add brand');
  } finally {
    addBtn.disabled = false;
    addBtn.textContent = 'Add';
  }
};

loadBrands();
</script>
  </body>
</html>
